<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Army Training Tracker</title>

<style>
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:auto;
padding:15px;
background:#f5f5f5;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.15);
}

input, textarea, select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
box-sizing:border-box;
}

button{
padding:10px;
width:100%;
background:#4b5320;
color:white;
border:none;
border-radius:5px;
}

h1{
text-align:center;
}
</style>

</head>

<body>

<h1>6-Week Army Training Tracker</h1>

<label><b>Select Week</b></label> <select id="weekSelect"></select>

<div id="content"></div>

<script>

const weeks = {
1:["6x400m","2 mi steady","3 mi easy"],
2:["8x400m","2.5 mi tempo","3.5 mi easy"],
3:["5x800m","3 mi tempo","4 mi easy"],
4:["6x800m","3 mi tempo","5 mi easy"],
5:["4x1200m","4 mi tempo","5-6 mi easy"],
6:["6x400m","2 mi easy","2 mi time trial"]
};

const weekSelect=document.getElementById("weekSelect");

for(let i=1;i<=6;i++){
weekSelect.innerHTML += `<option value="${i}">Week ${i}</option>`;
}

function save(id){
const data={};

document.querySelectorAll(`[data-save="${id}"]`)
.forEach(el=>{
data[el.name]=el.value;
});

localStorage.setItem(id,JSON.stringify(data));

alert("Saved");
}

function render(){

const week=weekSelect.value || 1;

let html="";

const runNames=[
"Tuesday Intervals",
"Thursday Tempo",
"Saturday Long Run"
];

runNames.forEach((name,index)=>{

const saveKey=`week${week}_run${index}`;
const saved=JSON.parse(localStorage.getItem(saveKey)||"{}");

html += `
<div class="card">
<h2>${name}</h2>

<p><b>Planned:</b> ${weeks[week][index]}</p>

Distance
<input
data-save="${saveKey}"
name="distance"
value="${saved.distance||''}"
>

Time
<input
data-save="${saveKey}"
name="time"
value="${saved.time||''}"
>

Notes
<textarea
data-save="${saveKey}"
name="notes"
>${saved.notes||''}</textarea>

<button onclick="save('${saveKey}')">
Save Run
</button>

</div>
`;
});

html += `

<div class="card">
<h2>Monday – Lower Body Strength</h2>

Back Squat 5x5 <input>

Romanian Deadlift 4x8 <input>

Walking Lunges 3x20 <input>

Step-Ups 3x12/leg <input>

Calf Raises 4x20 <input>

</div>

<div class="card">
<h2>Wednesday – Upper Body Endurance</h2>

Bench Press 4x8 <input>

Pull-Ups 5 sets <input>

Overhead Press 4x10 <input>

DB Rows 4x12 <input>

Push-Ups 3 max sets <input>

</div>

<div class="card">
<h2>Friday – Work Capacity Circuit</h2>

Deadlift <input>

Push-Ups <input>

Goblet Squat <input>

Pull-Ups <input>

Row <input>

Farmer Carry <input>

</div>

<div class="card">
<h2>Swim / Pool Work</h2>

Monday Recovery Swim <input>

Wednesday Swim Intervals <input>

Sunday Recovery Swim <input>

</div>
`;

document.getElementById("content").innerHTML=html;
}

weekSelect.addEventListener("change",render);

render();

</script>

</body>
</html>
